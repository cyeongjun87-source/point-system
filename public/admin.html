<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="최병훈 포인트 시스템 - 관리자 페이지">
  <title>관리자 · Point System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <nav class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="url(#grad2)" stroke-width="3" fill="none" />
          <text x="20" y="26" text-anchor="middle" fill="url(#grad2)" font-size="18" font-weight="800"
            font-family="Inter">P</text>
          <defs>
            <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#818cf8" />
              <stop offset="100%" stop-color="#6366f1" />
            </linearGradient>
          </defs>
        </svg>
        <span>Point System</span>
      </a>
    </div>
    <div class="topbar-right">
      <span class="badge badge-admin">관리자</span>
      <span class="topbar-user" id="currentUser">관리자</span>
      <a href="index.html" class="btn btn-ghost btn-sm">로그아웃</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">포인트 지급 관리</h1>
      <p class="page-desc">돼지에게 포인트를 지급하고 관리하세요</p>
    </div>

    <!-- 미션 참조 리스트 (관리용) -->
    <div class="card" style="margin-bottom:2rem">
      <div class="card-header">
        <div class="card-icon card-icon-purple">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <h2 class="card-title">🔥 오늘의 포인트 미션 기준</h2>
      </div>
      <div class="mission-list">
        <div class="grid grid-auto" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
          <div class="mission-item">
            <div class="mission-info">
              <div class="mission-name">플랭크 (1분)</div>
              <div class="mission-points">50<span>P</span></div>
            </div>
          </div>
          <div class="mission-item">
            <div class="mission-info">
              <div class="mission-name">스쿼트 (30번)</div>
              <div class="mission-points">30<span>P</span></div>
            </div>
          </div>
          <div class="mission-item">
            <div class="mission-info">
              <div class="mission-name">윗몸일으키기 (30번)</div>
              <div class="mission-points">30<span>P</span></div>
            </div>
          </div>
          <div class="mission-item">
            <div class="mission-info">
              <div class="mission-name">버피 (50번)</div>
              <div class="mission-points">100<span>P</span></div>
            </div>
          </div>
          <div class="mission-item">
            <div class="mission-info">
              <div class="mission-name">팔굽혀펴기 (10번)</div>
              <div class="mission-points">20<span>P</span></div>
            </div>
          </div>
          <div class="mission-item">
            <div class="mission-info">
              <div class="mission-name">전체 성공 보너스</div>
              <div class="mission-points">50<span>P</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-2">
      <!-- 포인트 지급 카드 -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon card-icon-purple">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
          <h2 class="card-title">포인트 지급</h2>
        </div>
        <form id="grantForm" class="form-stack">
          <div class="form-group">
            <label for="targetUser" class="form-label">지급 대상</label>
            <div class="select-wrapper">
              <select id="targetUser" class="form-select" required>
                <option value="" disabled selected>유저를 선택하세요</option>
              </select>
              <div class="select-arrow">
                <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
                  <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="grantAmount" class="form-label">지급 포인트</label>
            <div class="input-with-suffix">
              <input type="number" id="grantAmount" class="form-input" placeholder="0" required>
              <span class="input-suffix">P</span>
            </div>
          </div>
          <div class="form-group">
            <label for="grantDesc" class="form-label">지급 사유 <span class="text-muted">(선택)</span></label>
            <input type="text" id="grantDesc" class="form-input" placeholder="예: 프랭크 1분">
          </div>
          <button type="submit" id="grantBtn" class="btn btn-primary btn-full">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span>포인트 지급하기</span>
          </button>
        </form>
      </div>

      <!-- 유저 현황 카드 -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon card-icon-blue">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path
                d="M10 10C12.2091 10 14 8.20914 14 6C14 3.79086 12.2091 2 10 2C7.79086 2 6 3.79086 6 6C6 8.20914 7.79086 10 10 10Z"
                stroke="currentColor" stroke-width="1.8" />
              <path d="M3 18C3 14.134 6.13401 11 10 11C13.866 11 17 14.134 17 18" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </div>
          <h2 class="card-title">전체 유저 현황</h2>
        </div>
        <div class="user-list" id="userList"></div>
      </div>
    </div>

    <!-- 쿠폰 사용 로그 (관리자 전용) -->
    <div class="card" style="margin-top:1.5rem">
      <div class="card-header">
        <div class="card-icon card-icon-amber">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="5" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.8" />
            <path d="M7 5V15" stroke="currentColor" stroke-width="1.8" stroke-dasharray="2 2" />
            <path d="M11 9L13 11L15 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <h2 class="card-title">쿠폰 사용 내역</h2>
      </div>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>사용자</th>
              <th>쿠폰명</th>
              <th>포인트</th>
              <th>구매일</th>
              <th>사용일</th>
            </tr>
          </thead>
          <tbody id="couponLogBody"></tbody>
        </table>
        <p class="text-muted text-center" id="couponLogEmpty" style="display:none;padding:2rem;">사용된 쿠폰이 없습니다.</p>
      </div>
    </div>

    <!-- 최근 거래 내역 -->
    <div class="card" style="margin-top:1.5rem">
      <div class="card-header">
        <div class="card-icon card-icon-green">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 10H17M3 5H17M3 15H17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </div>
        <h2 class="card-title">최근 거래 내역</h2>
      </div>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>유저</th>
              <th>유형</th>
              <th>금액</th>
              <th>설명</th>
              <th>일시</th>
            </tr>
          </thead>
          <tbody id="txBody"></tbody>
        </table>
        <p class="text-muted text-center" id="txEmpty" style="display:none;padding:2rem;">거래 내역이 없습니다.</p>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const myId = params.get('id');
    document.getElementById('currentUser').textContent = decodeURIComponent(params.get('name') || '관리자');

    async function loadUsers() {
      const res = await fetch('/api/users');
      const users = await res.json();
      const $target = document.getElementById('targetUser');
      const $list = document.getElementById('userList');
      $target.innerHTML = '<option value="" disabled selected>유저를 선택하세요</option>';
      $list.innerHTML = '';
      users.forEach(u => {
        if (u.name !== '관리자') {
          const opt = document.createElement('option');
          opt.value = u.id; opt.textContent = u.name;
          $target.appendChild(opt);
        }
        const div = document.createElement('div');
        div.className = 'user-row';
        div.innerHTML = `
          <div class="user-row-left">
            <div class="avatar">${u.name[0]}</div>
            <div>
              <div class="user-row-name">${u.name}</div>
              <div class="user-row-role text-muted">${u.name === '관리자' ? '관리자' : '돼지'}</div>
            </div>
          </div>
          <div class="user-row-balance">${u.balance.toLocaleString()}<span class="text-muted">P</span></div>`;
        $list.appendChild(div);
      });
    }

    async function loadCouponLogs() {
      const res = await fetch('/api/admin/coupon-logs');
      const logs = await res.json();
      const $tbody = document.getElementById('couponLogBody');
      const $empty = document.getElementById('couponLogEmpty');
      if (logs.length === 0) { $tbody.innerHTML = ''; $empty.style.display = 'block'; return; }
      $empty.style.display = 'none';
      $tbody.innerHTML = logs.map(l => {
        const pDate = l.purchased_at.replace('T', ' ');
        const uDate = l.used_at.replace('T', ' ');
        return `
        <tr>
          <td>${l.user_name}</td>
          <td>${l.item_name}</td>
          <td class="text-red">-${l.item_price.toLocaleString()}P</td>
          <td class="text-muted">${pDate}</td>
          <td class="text-muted">${uDate}</td>
        </tr>`;
      }).join('');
    }

    async function loadAllTransactions() {
      const usersRes = await fetch('/api/users');
      const users = await usersRes.json();
      const nameMap = {};
      users.forEach(u => nameMap[u.id] = u.name);
      let allTx = [];
      for (const u of users) {
        const txRes = await fetch(`/api/users/${u.id}/transactions`);
        const txList = await txRes.json();
        txList.forEach(t => { t._userName = nameMap[t.user_id]; });
        allTx = allTx.concat(txList);
      }
      allTx.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const $tbody = document.getElementById('txBody');
      const $empty = document.getElementById('txEmpty');
      if (allTx.length === 0) { $tbody.innerHTML = ''; $empty.style.display = 'block'; return; }
      $empty.style.display = 'none';
      $tbody.innerHTML = allTx.slice(0, 20).map(t => `
        <tr>
          <td>${t._userName}</td>
          <td><span class="badge ${t.type === '지급' ? 'badge-grant' : (t.type === '사용' ? 'badge-use' : 'badge-coupon-use')}">${t.type}</span></td>
          <td class="${t.amount > 0 ? 'text-green' : (t.amount < 0 ? 'text-red' : 'text-muted')}">${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()}P</td>
          <td>${t.description || '-'}</td>
          <td class="text-muted">${t.created_at.replace('T', ' ')}</td>
        </tr>`).join('');
    }

    document.getElementById('grantForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('grantBtn');
      btn.disabled = true;
      const userId = document.getElementById('targetUser').value;
      const amount = parseInt(document.getElementById('grantAmount').value, 10);
      const description = document.getElementById('grantDesc').value;
      try {
        const res = await fetch('/api/grant', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: parseInt(userId), amount, description })
        });
        const data = await res.json();
        if (data.success) {
          const actionType = amount > 0 ? '지급' : '차감';
          alert(`✅ ${data.user.name}님에게 ${Math.abs(amount).toLocaleString()}P ${actionType} 완료! (잔액: ${data.user.balance.toLocaleString()}P)`);
          document.getElementById('grantForm').reset();
          loadUsers(); loadAllTransactions();
        } else { alert('❌ ' + data.error); }
      } catch (err) { alert('❌ 오류: ' + err.message); }
      finally { btn.disabled = false; }
    });

    loadUsers(); loadCouponLogs(); loadAllTransactions();
  </script>
</body>

</html>
