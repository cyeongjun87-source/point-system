<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 · Point System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <nav class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="url(#grad2)" stroke-width="3" fill="none" />
          <text x="20" y="26" text-anchor="middle" fill="url(#grad2)" font-size="18" font-weight="800">P</text>
          <defs>
            <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#818cf8" />
              <stop offset="100%" stop-color="#6366f1" />
            </linearGradient>
          </defs>
        </svg>
        <span>Point Admin</span>
      </a>
    </div>
    <div class="topbar-right">
      <span class="badge badge-admin">관리자</span>
      <a href="index.html" class="btn btn-ghost btn-sm">로그아웃</a>
    </div>
  </nav>

  <main class="main-content">
    <!-- 대시보드 -->
    <div class="page-header">
      <h1 class="page-title">시스템 대시보드</h1>
      <p class="page-desc">전체 유저 활동 및 포인트 유통 현황</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">전체 유저</span>
        <span class="stat-value" id="statUserCount">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">총 유통 포인트</span>
        <span class="stat-value" id="statTotalBalance">0P</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">누적 지급액</span>
        <span class="stat-value" id="statTotalIssued" style="color:var(--green)">0P</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">누적 사용액</span>
        <span class="stat-value" id="statTotalUsed" style="color:var(--red)">0P</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:2rem">
      <div class="card-header"><h2 class="card-title">포인트 트렌드 (최근 7일)</h2></div>
      <div class="dashboard-chart">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <div class="grid grid-2">
      <!-- 포인트 지급 -->
      <div class="card">
        <div class="card-header"><h2 class="card-title">포인트 지급</h2></div>
        <form id="grantForm" class="form-stack">
          <div class="form-group">
            <label class="form-label">지급 대상</label>
            <select id="targetUser" class="form-select" required></select>
          </div>
          <div class="form-group">
            <label class="form-label">미션 선택</label>
            <select id="targetMission" class="form-select">
              <option value="">일반 지급 (직접 입력)</option>
            </select>
          </div>
          <div id="manualGrantFields">
            <div class="form-group">
              <label class="form-label">금액 (P)</label>
              <input type="number" id="grantAmount" class="form-input" placeholder="0">
            </div>
            <div class="form-group">
              <label class="form-label">지급 사유</label>
              <input type="text" id="grantDesc" class="form-input" placeholder="사유 입력">
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full">포인트 지급하기</button>
        </form>
      </div>

      <!-- 유저 현황 -->
      <div class="card">
        <div class="card-header"><h2 class="card-title">전체 유저 현황</h2></div>
        <div class="user-list" id="userList"></div>
      </div>
    </div>

    <!-- 미션 편집기 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">미션 편집기</h2></div>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr><th>아이콘</th><th>미션명</th><th>목표</th><th>포인트</th><th>관리</th></tr>
          </thead>
          <tbody id="missionTableBody"></tbody>
        </table>
      </div>
      <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border)">
        <h3 class="card-title" style="margin-bottom:1rem">새 미션 추가</h3>
        <div class="grid grid-auto" style="grid-template-columns: 1fr 1fr 1fr;">
          <input type="text" id="newMissionName" class="form-input" placeholder="미션명">
          <input type="text" id="newMissionGoal" class="form-input" placeholder="목표 (예: 1분)">
          <input type="number" id="newMissionPoints" class="form-input" placeholder="포인트">
        </div>
        <textarea id="newMissionDesc" class="form-input" style="margin-top:0.5rem" placeholder="상세 설명"></textarea>
        <button id="addMissionBtn" class="btn btn-ghost btn-full" style="margin-top:1rem">미션 등록</button>
      </div>
    </div>

    <!-- 로그 섹션 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">전체 거래 내역</h2></div>
      <div class="table-wrapper">
        <table class="table">
          <thead><tr><th>유저</th><th>유형</th><th>금액</th><th>설명</th><th>일시</th></tr></thead>
          <tbody id="txBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    let trendChart;

    async function loadStats() {
      const res = await fetch('/api/admin/stats');
      const data = await res.json();
      document.getElementById('statUserCount').textContent = data.userCount;
      document.getElementById('statTotalBalance').textContent = Number(data.totalBalance).toLocaleString() + 'P';
      document.getElementById('statTotalIssued').textContent = '+' + Number(data.totalIssued).toLocaleString() + 'P';
      document.getElementById('statTotalUsed').textContent = '-' + Number(data.totalUsed).toLocaleString() + 'P';

      const ctx = document.getElementById('trendChart').getContext('2d');
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.trends.map(t => t.date),
          datasets: [
            { label: '지급', data: data.trends.map(t => t.issued), borderColor: '#22c55e', tension: 0.4 },
            { label: '사용', data: data.trends.map(t => t.used), borderColor: '#ef4444', tension: 0.4 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
      });
    }

    async function loadMissions() {
      const res = await fetch('/api/missions');
      const missions = await res.json();
      const $select = document.getElementById('targetMission');
      const $tbody = document.getElementById('missionTableBody');
      $select.innerHTML = '<option value="">일반 지급 (직접 입력)</option>';
      $tbody.innerHTML = '';
      missions.forEach(m => {
        $select.innerHTML += `<option value="${m.id}" data-points="${m.points}" data-name="${m.name}">${m.name} (${m.points}P)</option>`;
        $tbody.innerHTML += `<tr>
          <td><i data-lucide="${m.icon || 'star'}"></i></td>
          <td>${m.name}</td>
          <td>${m.goal}</td>
          <td class="text-green">${m.points}P</td>
          <td><button class="btn btn-ghost btn-sm" onclick="deleteMission(${m.id})">삭제</button></td>
        </tr>`;
      });
      lucide.createIcons();
    }

    async function deleteMission(id) {
      if (!confirm('미션을 삭제하시겠습니까?')) return;
      await fetch(`/api/admin/missions/${id}`, { method: 'DELETE' });
      loadMissions();
    }

    document.getElementById('addMissionBtn').onclick = async () => {
      const body = {
        name: document.getElementById('newMissionName').value,
        goal: document.getElementById('newMissionGoal').value,
        points: parseInt(document.getElementById('newMissionPoints').value),
        description: document.getElementById('newMissionDesc').value,
        icon: 'star'
      };
      await fetch('/api/admin/missions', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
      loadMissions();
    };

    document.getElementById('targetMission').onchange = (e) => {
      const opt = e.target.selectedOptions[0];
      const manual = document.getElementById('manualGrantFields');
      if (e.target.value) manual.style.display = 'none';
      else manual.style.display = 'block';
    };

    document.getElementById('grantForm').onsubmit = async (e) => {
      e.preventDefault();
      const missionId = document.getElementById('targetMission').value;
      const opt = document.getElementById('targetMission').selectedOptions[0];
      const body = {
        user_id: parseInt(document.getElementById('targetUser').value),
        amount: missionId ? parseInt(opt.dataset.points) : parseInt(document.getElementById('grantAmount').value),
        description: missionId ? `미션 완료: ${opt.dataset.name}` : document.getElementById('grantDesc').value,
        mission_id: missionId ? parseInt(missionId) : null
      };
      const res = await fetch('/api/grant', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
      if ((await res.json()).success) {
        alert('지급 완료!');
        loadStats(); loadUsers(); loadAllTransactions();
      }
    };

    async function loadUsers() {
      const res = await fetch('/api/users');
      const users = await res.json();
      const $target = document.getElementById('targetUser');
      const $list = document.getElementById('userList');
      $target.innerHTML = '<option value="" disabled selected>유저 선택</option>';
      $list.innerHTML = '';
      users.forEach(u => {
        if (u.name !== '관리자') $target.innerHTML += `<option value="${u.id}">${u.name}</option>`;
        $list.innerHTML += `<div class="user-row"><div class="user-row-left"><div class="avatar">${u.name[0]}</div><div><div class="user-row-name">${u.name}</div></div></div><div class="user-row-balance">${u.balance.toLocaleString()}P</div></div>`;
      });
    }

    async function loadAllTransactions() {
      const users = await (await fetch('/api/users')).json();
      const nameMap = {}; users.forEach(u => nameMap[u.id] = u.name);
      let allTx = [];
      for (const u of users) {
        const txs = await (await fetch(`/api/users/${u.id}/transactions`)).json();
        txs.forEach(t => { t._userName = nameMap[t.user_id]; });
        allTx = allTx.concat(txs);
      }
      allTx.sort((a, b) => b.id - a.id);
      document.getElementById('txBody').innerHTML = allTx.slice(0, 30).map(t => `
        <tr>
          <td>${t._userName}</td>
          <td><span class="badge ${t.type === '지급' ? 'badge-grant' : (t.type === '사용' ? 'badge-use' : (t.type === '업적보상' ? 'badge-achievement' : 'badge-coupon-use'))}">${t.type}</span></td>
          <td class="${t.amount > 0 ? 'text-green' : (t.amount < 0 ? 'text-red' : 'text-muted')}">${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()}P</td>
          <td>${t.description}</td>
          <td class="text-muted">${t.created_at.replace('T', ' ')}</td>
        </tr>`).join('');
    }

    loadStats(); loadUsers(); loadMissions(); loadAllTransactions();
  </script>
</body>
</html>
