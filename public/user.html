<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 포인트 · Point System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <nav class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="url(#grad3)" stroke-width="3" fill="none" />
          <text x="20" y="26" text-anchor="middle" fill="url(#grad3)" font-size="18" font-weight="800">P</text>
        </svg>
        <span>Point System</span>
      </a>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="currentUser">사용자</span>
      <a href="index.html" class="btn btn-ghost btn-sm">로그아웃</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="balance-hero">
      <div class="balance-label">내 포인트 잔액</div>
      <div class="balance-amount" id="balanceAmount">0</div>
      <div class="balance-unit">P</div>
    </div>

    <!-- 업적 섹션 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">🏆 내 업적 보관함</h2></div>
      <div class="achievement-grid" id="achievementGrid"></div>
    </div>

    <!-- 미션 섹션 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">🔥 오늘의 포인트 미션</h2></div>
      <div class="mission-list" id="missionList"></div>
    </div>

    <!-- 상점 -->
    <div class="page-header" style="margin-top:2rem">
      <h1 class="page-title">포인트 상점</h1>
      <p class="page-desc">구매한 쿠폰은 쿠폰함에 보관됩니다</p>
    </div>
    <div class="grid grid-auto" id="itemGrid"></div>

    <!-- 쿠폰함 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">🎟️ 내 쿠폰함</h2><span class="badge" id="couponCount">0</span></div>
      <div id="couponList" class="coupon-list"></div>
    </div>

    <!-- 거래 내역 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">📜 거래 내역</h2></div>
      <div class="table-wrapper">
        <table class="table">
          <thead><tr><th>유형</th><th>금액</th><th>설명</th><th>일시</th></tr></thead>
          <tbody id="myTxBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const userId = params.get('id');
    const userName = decodeURIComponent(params.get('name') || '사용자');
    document.getElementById('currentUser').textContent = userName;

    async function loadBalance() {
      const res = await fetch(`/api/users/${userId}`);
      const user = await res.json();
      document.getElementById('balanceAmount').textContent = user.balance.toLocaleString();
    }

    async function loadAchievements() {
      const res = await fetch(`/api/users/${userId}/achievements`);
      const achis = await res.json();
      document.getElementById('achievementGrid').innerHTML = achis.map(a => `
        <div class="achievement-card ${a.earned ? 'earned' : ''}">
          <div class="achievement-icon"><i data-lucide="${a.icon}"></i></div>
          <div class="achievement-name">${a.name}</div>
          <div class="achievement-points">+${a.bonus_points}P</div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    async function loadMissions() {
      const res = await fetch('/api/missions');
      const missions = await res.json();
      document.getElementById('missionList').innerHTML = missions.map(m => `
        <div class="mission-item">
          <div class="mission-left">
            <div class="mission-icon"><i data-lucide="${m.icon || 'star'}"></i></div>
            <div>
              <div class="mission-name">${m.name} <span class="mission-goal">${m.goal}</span></div>
              <div class="mission-desc">${m.description}</div>
            </div>
          </div>
          <div class="mission-points">${m.points}<span>P</span></div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    async function loadItems() {
      const res = await fetch('/api/items');
      const items = await res.json();
      const $grid = document.getElementById('itemGrid');
      $grid.innerHTML = items.map(item => `
        <div class="card item-card">
          <div class="item-name">${item.name}</div>
          <div class="item-price">${item.price.toLocaleString()}<span>P</span></div>
          <button class="btn btn-primary btn-full" onclick="buyItem(${item.id}, '${item.name}')">구매하기</button>
        </div>`).join('');
    }

    async function buyItem(id, name) {
      if (!confirm(`"${name}"을(를) 구매하시겠습니까?`)) return;
      const res = await fetch('/api/buy', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: parseInt(userId), item_id: id })
      });
      const data = await res.json();
      if (data.success) { alert('구매 완료!'); loadBalance(); loadCoupons(); loadTransactions(); loadAchievements(); }
      else alert(data.error);
    }

    async function loadCoupons() {
      const res = await fetch(`/api/users/${userId}/coupons`);
      const coupons = await res.json();
      document.getElementById('couponCount').textContent = coupons.length;
      document.getElementById('couponList').innerHTML = coupons.map(c => `
        <div class="coupon-item">
          <div><div class="coupon-name">${c.item_name}</div><div class="coupon-meta">${c.purchased_at.replace('T',' ')}</div></div>
          <button class="btn-use" onclick="useCoupon(${c.id})">사용하기</button>
        </div>`).join('');
    }

    async function useCoupon(id) {
      if (!confirm('쿠폰을 사용하시겠습니까?')) return;
      const res = await fetch(`/api/coupons/${id}/use`, { method: 'POST' });
      if ((await res.json()).success) { alert('사용 완료!'); loadCoupons(); loadTransactions(); loadAchievements(); }
    }

    async function loadTransactions() {
      const res = await fetch(`/api/users/${userId}/transactions`);
      const txs = await res.json();
      document.getElementById('myTxBody').innerHTML = txs.map(t => `
        <tr>
          <td><span class="badge ${t.type === '지급' ? 'badge-grant' : (t.type === '사용' ? 'badge-use' : (t.type === '업적보상' ? 'badge-achievement' : 'badge-coupon-use'))}">${t.type}</span></td>
          <td class="${t.amount > 0 ? 'text-green' : (t.amount < 0 ? 'text-red' : 'text-muted')}">${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()}P</td>
          <td>${t.description}</td>
          <td class="text-muted">${t.created_at.replace('T', ' ')}</td>
        </tr>`).join('');
    }

    loadBalance(); loadAchievements(); loadMissions(); loadItems(); loadCoupons(); loadTransactions();
  </script>
</body>
</html>
