<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 포인트 · Point System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- MediaPipe Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <nav class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="url(#grad3)" stroke-width="3" fill="none" />
          <text x="20" y="26" text-anchor="middle" fill="url(#grad3)" font-size="18" font-weight="800">P</text>
        </svg>
        <span>Point System</span>
      </a>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="currentUser">사용자</span>
      <a href="index.html" class="btn btn-ghost btn-sm">로그아웃</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="balance-hero">
      <div class="balance-label">내 포인트 잔액</div>
      <div class="balance-amount" id="balanceAmount">0</div>
      <div class="balance-unit">P</div>
    </div>

    <!-- 업적 섹션 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">🏆 내 업적 보관함</h2></div>
      <div class="achievement-grid" id="achievementGrid"></div>
    </div>

    <!-- 미션 섹션 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">🔥 오늘의 포인트 미션</h2></div>
      <div class="mission-list" id="missionList"></div>
    </div>

    <!-- 상점 -->
    <div class="page-header" style="margin-top:2rem">
      <h1 class="page-title">포인트 상점</h1>
      <p class="page-desc">구매한 쿠폰은 쿠폰함에 보관됩니다</p>
    </div>
    <div class="grid grid-auto" id="itemGrid"></div>

    <!-- 쿠폰함 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">🎟️ 내 쿠폰함</h2><span class="badge" id="couponCount">0</span></div>
      <div id="couponList" class="coupon-list"></div>
    </div>

    <!-- 거래 내역 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header"><h2 class="card-title">📜 거래 내역</h2></div>
      <div class="table-wrapper">
        <table class="table">
          <thead><tr><th>유형</th><th>금액</th><th>설명</th><th>일시</th></tr></thead>
          <tbody id="myTxBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- 업적 상세 모달 -->
  <div id="achievementModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <div class="achievement-icon" id="modalAchiIcon" style="margin:0; width:50px; height:50px; font-size:1.5rem"></div>
        <div style="flex:1; margin-left:1rem">
          <h2 class="modal-title" id="modalAchiName">업적 이름</h2>
          <div class="achievement-points" id="modalAchiPoints">+0P</div>
        </div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p id="modalAchiDesc" style="color:var(--text); line-height:1.6">업적 달성 방법 설명...</p>
        <div id="modalAchiStatus" style="margin-top:1.5rem"></div>
      </div>
    </div>
  </div>

  <!-- 운동 미션 모달 -->
  <div id="exerciseModal" class="modal-overlay" style="display:none; z-index: 1000; align-items: center; justify-content: center;">
    <div class="modal-content" style="max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto;">
      <div class="modal-header">
        <h2 class="modal-title">스쿼트 미션 진행 중</h2>
        <button class="modal-close" onclick="stopExercise()">&times;</button>
      </div>
      <div class="modal-body" style="text-align: center; position: relative;">
        <div id="warningMsg" style="display:none; color: white; background: var(--red, #ef4444); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-weight: bold;">몸 전체가 보이게 물러나 주세요</div>
        <div style="position: relative; display: inline-block; width: 100%; max-width: 640px;">
          <video id="input_video" style="display: none;"></video>
          <canvas id="output_canvas" width="640" height="480" style="width: 100%; height: auto; border-radius: 0.5rem; background: #000;"></canvas>
          <div style="position: absolute; top: 1rem; left: 1rem; background: rgba(0,0,0,0.6); padding: 1rem 1.5rem; border-radius: 1rem; color: white; font-size: 2rem; font-weight: 800;">
            <span id="squatCount">0</span> / <span id="squatTarget">30</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const userId = params.get('id');
    const userName = decodeURIComponent(params.get('name') || '사용자');
    document.getElementById('currentUser').textContent = userName;

    async function loadBalance() {
      const res = await fetch(`/api/users/${userId}`);
      const user = await res.json();
      document.getElementById('balanceAmount').textContent = user.balance.toLocaleString();
    }

    async function loadAchievements() {
      const res = await fetch(`/api/users/${userId}/achievements`);
      const achis = await res.json();
      const $grid = document.getElementById('achievementGrid');
      $grid.innerHTML = achis.map(a => `
        <div class="achievement-card ${a.earned ? 'earned' : ''}" onclick='showAchiDetail(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
          <div class="achievement-icon"><i data-lucide="${a.icon}"></i></div>
          <div class="achievement-name">${a.name}</div>
          <div class="achievement-points">+${a.bonus_points}P</div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function showAchiDetail(achi) {
      document.getElementById('modalAchiIcon').innerHTML = `<i data-lucide="${achi.icon}"></i>`;
      document.getElementById('modalAchiName').textContent = achi.name;
      document.getElementById('modalAchiPoints').textContent = `+${achi.bonus_points}P 보너스`;
      document.getElementById('modalAchiDesc').textContent = achi.description;
      
      const $status = document.getElementById('modalAchiStatus');
      if (achi.earned) {
        $status.innerHTML = `<div class="badge badge-grant" style="width:100%; justify-content:center; padding:0.75rem">획득 완료 ✨</div>`;
      } else {
        $status.innerHTML = `<div class="badge" style="width:100%; justify-content:center; padding:0.75rem; background:rgba(255,255,255,0.05); color:var(--text-muted)">미획득</div>`;
      }
      
      document.getElementById('achievementModal').style.display = 'flex';
      lucide.createIcons();
    }

    function closeModal() {
      document.getElementById('achievementModal').style.display = 'none';
    }

    // 모달 바깥 클릭 시 닫기
    window.onclick = (e) => {
      const modal = document.getElementById('achievementModal');
      if (e.target === modal) closeModal();
    };

    async function loadMissions() {
      const res = await fetch('/api/missions');
      const missions = await res.json();
      
      const grouped = {};
      const noCategory = [];
      missions.forEach(m => {
        const match = m.name.match(/^\[(.*?)\]\s*(.*)$/);
        if (match) {
          const cat = match[1];
          if (!grouped[cat]) grouped[cat] = [];
          grouped[cat].push({ ...m, cleanName: match[2] });
        } else {
          noCategory.push({ ...m, cleanName: m.name });
        }
      });

      let html = '';
      for (const [cat, list] of Object.entries(grouped)) {
        html += `<div class="badge" style="margin-top: 1rem; margin-bottom: 0.5rem; background: var(--primary); color: white;"># ${cat}</div>`;
        html += list.map(m => `
          <div class="mission-item" style="margin-bottom: 0.5rem;">
            <div class="mission-left">
              <div class="mission-icon"><i data-lucide="${m.icon || 'star'}"></i></div>
              <div>
                <div class="mission-name">${m.cleanName} <span class="mission-goal">${m.goal}</span></div>
                <div class="mission-desc">${m.description}</div>
                ${m.cleanName.includes('스쿼트') ? `<button class="btn btn-primary btn-sm" style="margin-top:0.5rem;" onclick="startSquatMission(${m.id}, ${m.points}, parseInt('${m.goal}'))">시작하기</button>` : ''}
              </div>
            </div>
            <div class="mission-points">${m.points}<span>P</span></div>
          </div>
        `).join('');
      }

      if (noCategory.length > 0) {
        html += `<div class="badge" style="margin-top: 1rem; margin-bottom: 0.5rem; background: var(--primary); color: white;"># 기타</div>`;
        html += noCategory.map(m => `
          <div class="mission-item" style="margin-bottom: 0.5rem;">
            <div class="mission-left">
              <div class="mission-icon"><i data-lucide="${m.icon || 'star'}"></i></div>
              <div>
                <div class="mission-name">${m.cleanName} <span class="mission-goal">${m.goal}</span></div>
                <div class="mission-desc">${m.description}</div>
                ${m.cleanName.includes('스쿼트') ? `<button class="btn btn-primary btn-sm" style="margin-top:0.5rem;" onclick="startSquatMission(${m.id}, ${m.points}, parseInt('${m.goal}'))">시작하기</button>` : ''}
              </div>
            </div>
            <div class="mission-points">${m.points}<span>P</span></div>
          </div>
        `).join('');
      }

      document.getElementById('missionList').innerHTML = html;
      lucide.createIcons();
    }

    async function loadItems() {
      const res = await fetch('/api/items');
      const items = await res.json();
      const $grid = document.getElementById('itemGrid');
      $grid.innerHTML = items.map(item => `
        <div class="card item-card">
          <div class="item-name">${item.name}</div>
          <div class="item-price">${item.price.toLocaleString()}<span>P</span></div>
          <button class="btn btn-primary btn-full" onclick="buyItem(${item.id}, '${item.name}')">구매하기</button>
        </div>`).join('');
    }

    async function buyItem(id, name) {
      if (!confirm(`"${name}"을(를) 구매하시겠습니까?`)) return;
      const res = await fetch('/api/buy', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: parseInt(userId), item_id: id })
      });
      const data = await res.json();
      if (data.success) { alert('구매 완료!'); loadBalance(); loadCoupons(); loadTransactions(); loadAchievements(); }
      else alert(data.error);
    }

    async function loadCoupons() {
      const res = await fetch(`/api/users/${userId}/coupons`);
      const coupons = await res.json();
      document.getElementById('couponCount').textContent = coupons.length;
      document.getElementById('couponList').innerHTML = coupons.map(c => `
        <div class="coupon-item">
          <div><div class="coupon-name">${c.item_name}</div><div class="coupon-meta">${c.purchased_at.replace('T',' ')}</div></div>
          <button class="btn-use" onclick="useCoupon(${c.id})">사용하기</button>
        </div>`).join('');
    }

    async function useCoupon(id) {
      if (!confirm('쿠폰을 사용하시겠습니까?')) return;
      const res = await fetch(`/api/coupons/${id}/use`, { method: 'POST' });
      if ((await res.json()).success) { alert('사용 완료!'); loadCoupons(); loadTransactions(); loadAchievements(); }
    }

    async function loadTransactions() {
      const res = await fetch(`/api/users/${userId}/transactions`);
      const txs = await res.json();
      document.getElementById('myTxBody').innerHTML = txs.map(t => `
        <tr>
          <td><span class="badge ${t.type === '지급' ? 'badge-grant' : (t.type === '사용' ? 'badge-use' : (t.type === '업적보상' ? 'badge-achievement' : 'badge-coupon-use'))}">${t.type}</span></td>
          <td class="${t.amount > 0 ? 'text-green' : (t.amount < 0 ? 'text-red' : 'text-muted')}">${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()}P</td>
          <td>${t.description}</td>
          <td class="text-muted">${t.created_at.replace('T', ' ')}</td>
        </tr>`).join('');
    }

    loadBalance(); loadAchievements(); loadMissions(); loadItems(); loadCoupons(); loadTransactions();

    // --- 실시간 운동 카운터 (MediaPipe Pose) ---
    let currentMissionId = null;
    let currentMissionPoints = 0;
    let targetSquats = 0;
    let squatCount = 0;
    let isSquatDown = false;
    let camera = null;
    let pose = null;
    let isExercising = false;

    function calculateAngle(a, b, c) {
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    function startSquatMission(id, points, target) {
      currentMissionId = id;
      currentMissionPoints = points;
      targetSquats = target || 30; // default 30
      squatCount = 0;
      isSquatDown = false;
      isExercising = true;

      document.getElementById('squatCount').textContent = squatCount;
      document.getElementById('squatTarget').textContent = targetSquats;
      document.getElementById('exerciseModal').style.display = 'flex';
      document.getElementById('warningMsg').style.display = 'none';

      const videoElement = document.getElementById('input_video');
      const canvasElement = document.getElementById('output_canvas');
      const canvasCtx = canvasElement.getContext('2d');

      pose = new Pose({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        smoothSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults(onResults);

      camera = new Camera(videoElement, {
        onFrame: async () => {
          if (isExercising) {
            await pose.send({image: videoElement});
          }
        },
        width: 640,
        height: 480
      });
      camera.start();

      function onResults(results) {
        if (!isExercising) return;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.poseLandmarks) {
          drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
          drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});

          const landmarks = results.poseLandmarks;
          
          // Hip(24, 23), Knee(26, 25), Ankle(28, 27)
          const leftHip = landmarks[23];
          const leftKnee = landmarks[25];
          const leftAnkle = landmarks[27];
          const rightHip = landmarks[24];
          const rightKnee = landmarks[26];
          const rightAnkle = landmarks[28];

          const isVisible = (l) => l && l.visibility > 0.5;
          if (!(isVisible(leftHip) && isVisible(leftKnee) && isVisible(leftAnkle)) &&
              !(isVisible(rightHip) && isVisible(rightKnee) && isVisible(rightAnkle))) {
            document.getElementById('warningMsg').style.display = 'block';
            canvasCtx.restore();
            return;
          } else {
            document.getElementById('warningMsg').style.display = 'none';
          }

          let hip, knee, ankle;
          if (isVisible(leftHip) && isVisible(leftKnee) && isVisible(leftAnkle)) {
            hip = leftHip; knee = leftKnee; ankle = leftAnkle;
          } else {
            hip = rightHip; knee = rightKnee; ankle = rightAnkle;
          }

          const angle = calculateAngle(hip, knee, ankle);

          if (angle <= 100) {
            isSquatDown = true;
          } else if (angle >= 160 && isSquatDown) {
            isSquatDown = false;
            squatCount++;
            document.getElementById('squatCount').textContent = squatCount;

            if (squatCount >= targetSquats) {
              completeSquatMission();
            }
          }
        } else {
          document.getElementById('warningMsg').style.display = 'block';
        }
        canvasCtx.restore();
      }
    }

    async function completeSquatMission() {
      stopExercise();
      alert('스쿼트 미션 성공! 포인트가 지급됩니다.');
      
      try {
        const res = await fetch('/api/grant', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: parseInt(userId),
            amount: currentMissionPoints,
            description: '미션 완료: 스쿼트 자동 카운팅',
            mission_id: currentMissionId
          })
        });
        const result = await res.json();
        if (result.success) {
          loadBalance();
          loadTransactions();
          loadAchievements();
        } else {
          alert('포인트 지급 오류: ' + result.error);
        }
      } catch (err) {
        alert('서버 연결 오류: ' + err.message);
      }
    }

    function stopExercise() {
      isExercising = false;
      if (camera) {
        camera.stop();
        camera = null;
      }
      if (pose) {
        pose.close();
        pose = null;
      }
      document.getElementById('exerciseModal').style.display = 'none';
    }
  </script>
</body>
</html>
