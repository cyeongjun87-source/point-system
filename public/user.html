<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="최병훈 포인트 시스템 - 사용자 페이지">
  <title>내 포인트 · Point System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <nav class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="url(#grad3)" stroke-width="3" fill="none" />
          <text x="20" y="26" text-anchor="middle" fill="url(#grad3)" font-size="18" font-weight="800"
            font-family="Inter">P</text>
          <defs>
            <linearGradient id="grad3" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#818cf8" />
              <stop offset="100%" stop-color="#6366f1" />
            </linearGradient>
          </defs>
        </svg>
        <span>Point System</span>
      </a>
    </div>
    <div class="topbar-right">
      <span class="badge badge-user">41.3kg</span>
      <span class="topbar-user" id="currentUser">사용자</span>
      <a href="index.html" class="btn btn-ghost btn-sm">로그아웃</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="balance-hero">
      <div class="balance-label">내 포인트 잔액</div>
      <div class="balance-amount" id="balanceAmount">0</div>
      <div class="balance-unit">P</div>
    </div>

    <div class="page-header" style="margin-top:2rem">
      <h1 class="page-title">포인트 상점</h1>
      <p class="page-desc">구매한 쿠폰은 쿠폰함에 보관됩니다</p>
    </div>
    <div class="grid grid-auto" id="itemGrid"></div>

    <!-- 쿠폰함 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header">
        <div class="card-icon card-icon-amber">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="5" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.8" />
            <path d="M7 5V15" stroke="currentColor" stroke-width="1.8" stroke-dasharray="2 2" />
            <circle cx="13" cy="10" r="1.5" fill="currentColor" />
          </svg>
        </div>
        <h2 class="card-title">내 쿠폰함</h2>
        <span class="coupon-count" id="couponCount">0</span>
      </div>
      <div id="couponList" class="coupon-list"></div>
      <p class="text-muted text-center" id="couponEmpty" style="display:none;padding:2rem;">보유 쿠폰이 없습니다.</p>
    </div>

    <!-- 거래 내역 -->
    <div class="card" style="margin-top:2rem">
      <div class="card-header">
        <div class="card-icon card-icon-blue">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 10H17M3 5H17M3 15H17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </div>
        <h2 class="card-title">내 거래 내역</h2>
      </div>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>유형</th>
              <th>금액</th>
              <th>설명</th>
              <th>일시</th>
            </tr>
          </thead>
          <tbody id="myTxBody"></tbody>
        </table>
        <p class="text-muted text-center" id="myTxEmpty" style="display:none;padding:2rem;">거래 내역이 없습니다.</p>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const userId = params.get('id');
    const userName = decodeURIComponent(params.get('name') || '사용자');
    document.getElementById('currentUser').textContent = userName;

    async function loadBalance() {
      const res = await fetch(`/api/users/${userId}`);
      const user = await res.json();
      const $amt = document.getElementById('balanceAmount');
      $amt.textContent = user.balance.toLocaleString();
      
      // 마이너스 잔액 처리
      if (user.balance < 0) {
        $amt.classList.add('balance-negative');
      } else {
        $amt.classList.remove('balance-negative');
      }

      $amt.classList.add('balance-pop');
      setTimeout(() => $amt.classList.remove('balance-pop'), 400);
    }

    async function loadItems() {
      const res = await fetch('/api/items');
      const items = await res.json();
      const $grid = document.getElementById('itemGrid');
      $grid.innerHTML = '';
      const icons = [
        // 라면/면류
        `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 16h18M3 20h18"/><path d="M7 8V4c0-1.1.9-2 2-2h6a2 2 0 0 1 2 2v4"/><rect x="3" y="8" width="18" height="12" rx="2"/></svg>`,
        // 과자/패키지
        `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/><path d="M12 2v20"/><path d="M2 12h20"/></svg>`,
        // 음료/병
        `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4v2h-4zM9 4h6v2H9zM9 22h6v-2H9z"/><path d="M9 6v14a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V6"/></svg>`,
        // 마라탕/그릇
        `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10c0 5 4 9 9 9s9-4 9-9"/><path d="M7 10c0-3 2-5 5-5s5 2 5 5"/><path d="M12 19v3M9 22h6"/></svg>`,
        // 고급 음식/서빙
        `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15h18l-2 4H5l-2-4zM6 15V5c0-1.1.9-2 2-2h8a2 2 0 0 1 2 2v10"/></svg>`
      ];

      items.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card item-card';
        card.innerHTML = `
          <div class="item-icon">${icons[i % icons.length]}</div>
          <h3 class="item-name">${item.name}</h3>
          <div class="item-price">${item.price.toLocaleString()}<span>P</span></div>
          <button class="btn btn-primary btn-full buy-btn" data-item-id="${item.id}" data-item-name="${item.name}">
            <span>구매하기</span>
          </button>`;
        $grid.appendChild(card);
      });
      document.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const itemId = parseInt(btn.dataset.itemId);
          const itemName = btn.dataset.itemName;
          if (!confirm(`"${itemName}"을(를) 구매하시겠습니까?\n쿠폰함에 추가됩니다.`)) return;
          btn.disabled = true;
          btn.querySelector('span').textContent = '처리 중...';
          try {
            const res = await fetch('/api/buy', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ user_id: parseInt(userId), item_id: itemId })
            });
            const data = await res.json();
            if (data.success) {
              alert(`✅ "${itemName}" 쿠폰이 쿠폰함에 추가되었습니다!\n잔액: ${data.user.balance.toLocaleString()}P`);
              loadBalance(); loadCoupons(); loadTransactions();
            } else { alert('❌ ' + data.error); }
          } catch (err) { alert('❌ 오류: ' + err.message); }
          finally { btn.disabled = false; btn.querySelector('span').textContent = '구매하기'; }
        });
      });
    }

    async function loadCoupons() {
      const res = await fetch(`/api/users/${userId}/coupons`);
      const coupons = await res.json();
      const $list = document.getElementById('couponList');
      const $empty = document.getElementById('couponEmpty');
      document.getElementById('couponCount').textContent = coupons.length;
      if (coupons.length === 0) { $list.innerHTML = ''; $empty.style.display = 'block'; return; }
      $empty.style.display = 'none';
      $list.innerHTML = coupons.map(c => `
        <div class="coupon-item">
          <div class="coupon-left">
            <div class="coupon-ticket">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 5V15" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/></svg>
            </div>
            <div>
              <div class="coupon-name">${c.item_name}</div>
              <div class="coupon-meta">${c.item_price.toLocaleString()}P · ${c.purchased_at.replace('T', ' ')}</div>
            </div>
          </div>
          <button class="btn btn-use use-coupon-btn" data-coupon-id="${c.id}" data-coupon-name="${c.item_name}">사용하기</button>
        </div>`).join('');
      document.querySelectorAll('.use-coupon-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const couponId = parseInt(btn.dataset.couponId);
          const couponName = btn.dataset.couponName;
          if (!confirm(`"${couponName}" 쿠폰을 사용하시겠습니까?\n사용 후 쿠폰함에서 사라집니다.`)) return;
          btn.disabled = true; btn.textContent = '처리 중...';
          try {
            const res = await fetch(`/api/coupons/${couponId}/use`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            const data = await res.json();
            if (data.success) { alert(`✅ ${data.message}`); loadCoupons(); }
            else { alert('❌ ' + data.error); }
          } catch (err) { alert('❌ 오류: ' + err.message); }
        });
      });
    }

    async function loadTransactions() {
      const res = await fetch(`/api/users/${userId}/transactions`);
      const txList = await res.json();
      const $tbody = document.getElementById('myTxBody');
      const $empty = document.getElementById('myTxEmpty');
      if (txList.length === 0) { $tbody.innerHTML = ''; $empty.style.display = 'block'; return; }
      $empty.style.display = 'none';
      $tbody.innerHTML = txList.map(t => `
        <tr>
          <td><span class="badge ${t.type === '지급' ? 'badge-grant' : (t.type === '사용' ? 'badge-use' : 'badge-coupon-use')}">${t.type}</span></td>
          <td class="${t.amount > 0 ? 'text-green' : (t.amount < 0 ? 'text-red' : 'text-muted')}">${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()}P</td>
          <td>${t.description || '-'}</td>
          <td class="text-muted">${t.created_at.replace('T', ' ')}</td>
        </tr>`).join('');
    }

    loadBalance(); loadItems(); loadCoupons(); loadTransactions();
  </script>
</body>

</html>
